name: iOS Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build LoginApp
        run: |
          xcodebuild \
            -project LoginApp.xcodeproj \
            -scheme LoginApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build
